
#########################################################################
# Monkey Hi Hat application configuration
#
# All conf files used by the application follow the same layout:
#
# blank lines are disregarded
# hashtag lines and trailing comments are disregarded
# [section] is a key for key=value pairs within the section
# confs are loaded as Dictionary<section, Dictionary<key, value>>
# non-key=value entries are stored with an incrementing integer key
#
# This mhh.conf will be read from the application's top-level directory,
# and if it isn't found there, the full pathname to the config file can
# be specified by a "monkey-hi-hat-config" environment variable instead.
#
# All config settings are in the documentation at the dedicated website: 
# https://www.monkeyhihat.com/docs
#
#########################################################################


#########################################################################
[setup]
StartFullScreen=false
StartInStandby=false
CloseToStandby=false

SizeX=960
SizeY=540
StartX=100
StartY=100

RenderResolutionLimit=0
HideMousePointer=true
HideWindowBorder=false
FullscreenMinimizeOnFocusChange=true

ShaderCacheSize=150
FXCacheSize=50
LibraryCacheSize=10

RandomizeCrossfade=true
CrossfadeSeconds=2

FrameRateLimit=60
VSync=On

DetectSilenceSeconds=0
DetectSilenceMaxRMS=1.5
DetectSilenceAction=Idle

MinimumSilenceSeconds=0.25
ReplaceSilenceAfterSeconds=2.0
SyntheticDataBPM=120
SyntheticDataBeatDuration=0.1
SyntheticDataBeatFrequency=440
SyntheticDataAmplitude=0.5
SyntheticDataMinimumLevel=0.1
SyntheticDataAlgorithm=MetronomeBeat

RMSVolumeMilliseconds=300
NormalizeRMSVolumePeak=100
NormalizeFrequencyMagnitudePeak=6500
NormalizeFrequencyDecibelsPeak=90
SampleSize=1024
HistorySize=128

LogLevel=Warning
LogToConsole=true
LogCategories= MHH, Eyecandy.OpenGL
OpenGLErrorThrottle= 60000
OpenGLErrorLogging= Normal
OpenGLErrorBreakpoint= false

UnsecuredPort=50001

TestingSkipVizCount=0
TestingSkipFXCount=0

VideoFlip=Internal

#########################################################################
[msmd]
UnsecuredRelayPort=50002
RelayIPType=4
LaunchWaitSeconds=9

#########################################################################
[text]
ShowPlaylistPopups=true
ShowVizBylines=false
ShowTextBanners=false

PopupVisibilitySeconds=5
PopupFadeMilliseconds=1000

OverlayPermanent=false
OverlayVisibilitySeconds=10
OverlayUpdateMilliseconds=500

FontAtlasFilename=
OutlineWeight=0.55

TextBufferX=97
TextBufferY=30

CharacterSize=0.02
PositionX=-0.96
PositionY=0.5

#########################################################################
[text-banners]
# Bob's Bar and Grill
# Happy Birthday Mom!
# Congratulations to Mr. & Mrs. Jones!
# ACME Corp celebrating 25 years of Quality Widgets!
Monkey Hi Hat: The Best Free Music Visualizer
https://www.MonkeyHiHat.com/
<< tiny monkey paws playing tiny hi-hat cymbals >>
<< monkey see, monkey do >>
<< more fun than a barrel of monkeys >>
"Just a monkey with a plan..."
"Dance, monkey, dance!"
"Could a million Shakespeares write like a monkey?"
"Oh sure, it's FINE when a monkey does it."


#########################################################################
[ndi]
NDISender=false
NDIDeviceName=
NDIGroupList=

NDIReceiveFrom=
NDIReceiveInvert=true


#########################################################################
[linux]
#VisualizerPath=/mnt/nas3/monkey-hi-hat/shaders:/mnt/nas3/monkey-hi-hat/libraries:~/monkeydev/shaders:~/monkeydev/libraries
#PlaylistPath=/mnt/nas3/monkey-hi-hat/playlists:~/monkeydev/playlists
#TexturePath=/mnt/nas3/monkey-hi-hat/textures:~/monkeydev/textures
#FXPath=/mnt/nas3/monkey-hi-hat/fx:/mnt/nas3/monkey-hi-hat/libraries:~/monkeydev/fx:~/monkeydev/libraries
#CrossfadePath=/mnt/nas3/monkey-hi-hat/crossfades:/mnt/nas3/monkey-hi-hat/libraries:~/monkeydev/crossfades:~/monkeydev/libraries
#FFmpegPath=/usr/lib/x86_64-linux-gnu
#ScreenshotPath=~/Pictures

# Do not alter the following comment; these are markers for install scripts.
# INSTALL SCRIPT INSERTS PATH SETTINGS BELOW THIS LINE
# END OF CONTENT ADDED BY INSTALL SCRIPT

LogPath=

LoopbackApi=OpenALSoft

OpenALContextDeviceName=
CaptureDeviceName=

HideConsoleAtStartup=false
HideConsoleInStandby=true

ShowMediaPopups=true
MediaServiceName=

SkipX11Check=false

TestingExcludePaths=

#########################################################################
[windows]
#VisualizerPath=\\nas3\monkey-hi-hat\shaders;\\nas3\monkey-hi-hat\libraries;c:\monkeydev\shaders;c:\monkeydev\libraries
#PlaylistPath=\\nas3\monkey-hi-hat\playlists;c:\monkeydev\playlists
#TexturePath=\\nas3\monkey-hi-hat\textures;c:\monkeydev\textures
#FXPath=\\nas3\monkey-hi-hat\fx;\\nas3\monkey-hi-hat\libraries;c:\monkeydev\fx;c:\monkeydev\libraries
#CrossfadePath=\\nas3\monkey-hi-hat\crossfades;\\nas3\monkey-hi-hat\libraries;c:\monkeydev\crossfades;c:\monkeydev\libraries
#FFmpegPath=C:\Program Files\mhh\ffmpeg
#ScreenshotPath=C:\

LogPath=

LoopbackApi=WindowsInternal
OpenALContextDeviceName=
CaptureDeviceName=

HideConsoleAtStartup=false
HideConsoleInStandby=true

ShowSpotifyTrackPopups=true

SpoutSender=false

SpoutReceiveFrom=
SpoutReceiveInvert=true

TestingExcludePaths=

#########################################################################
# End of config template. Anything below was added by an installer.
